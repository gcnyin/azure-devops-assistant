<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Login - Azure DevOps Sprint Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .login-card {
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-hairline);
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body>
    <div class="hero-stripe"></div>
    <div class="login-page">
        <div class="login-card">
            <h1 class="text-xl font-semibold text-ink mb-2">Authentication Required</h1>
            <p class="text-sm text-ash mb-7 leading-relaxed">
                请输入 Web 访问 Token 以继续。Token 由服务器管理员在启动时通过 <code class="text-mute">WEB_ACCESS_TOKEN</code> 环境变量配置。
            </p>
            <form id="loginForm" autocomplete="off">
                <label for="tokenInput" class="block text-[13px] text-mute mb-1.5 font-medium">Access Token</label>
                <input type="password" id="tokenInput" name="token"
                       class="w-full px-3.5 py-2.5 text-sm bg-canvas border border-hairline rounded-lg
                              text-ink outline-none transition-colors duration-150
                              focus:border-mute placeholder:text-ash"
                       placeholder="输入访问 Token..." autofocus required>
                <button type="submit"
                        class="w-full mt-5 py-2.5 text-sm font-semibold text-black bg-ink border-none
                               rounded-lg cursor-pointer transition-opacity duration-150
                               hover:opacity-85 active:opacity-70">
                    登录
                </button>
            </form>
            <div id="loginError"
                 class="mt-3.5 px-3.5 py-2.5 bg-accent-red-soft border border-red-400/30
                        rounded-lg text-[13px] text-accent-red hidden">
            </div>
        </div>
    </div>
    <script>
        var NEXT_PATH = {{ next_path|tojson|safe }};
        (function () {
            var form = document.getElementById('loginForm');
            var input = document.getElementById('tokenInput');
            var errorEl = document.getElementById('loginError');

            var savedToken = localStorage.getItem('web_access_token');
            if (savedToken) {
                input.value = savedToken;
            }

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
            }

            function hideError() {
                errorEl.style.display = 'none';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                hideError();
                var token = input.value.trim();
                if (!token) {
                    showError('请输入 Token');
                    return;
                }
                fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                })
                .then(function (resp) {
                    return resp.json().then(function (data) {
                        if (resp.ok && data.ok) {
                            localStorage.setItem('web_access_token', token);
                            window.location.href = NEXT_PATH;
                        } else {
                            showError(data.error || 'Token 验证失败');
                        }
                    });
                })
                .catch(function () {
                    showError('网络请求失败，请检查服务器是否可用');
                });
            });
        })();
    </script>
</body>
</html>
